<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b46c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#11998e;stop-opacity:1" />
    </linearGradient>
    <clipPath id="rounded">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#grad)"/>

  <!-- Letter T -->
  <text
    x="32"
    y="46"
    font-family="Georgia, serif"
    font-size="38"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
  >T</text>

  <!-- Subtle dot accent (bottom right) -->
  <circle cx="50" cy="50" r="5" fill="white" opacity="0.25"/>
</svg>